<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>文字雲投影</title>

  <style>
    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at 10% 15%, rgba(59,130,246,.35), transparent 30%),
        radial-gradient(circle at 88% 20%, rgba(168,85,247,.28), transparent 30%),
        #0f172a;
      color: #0f172a;
    }

    .layout {
      width: 100vw;
      height: 100vh;
      padding: 22px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 16px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      color: white;
    }

    .sessionName {
      font-size: 22px;
      font-weight: 900;
      color: rgba(255,255,255,.75);
      margin-bottom: 6px;
    }

    .question {
      font-size: 42px;
      line-height: 1.18;
      font-weight: 950;
      letter-spacing: -.05em;
    }

    .statusBox {
      flex: 0 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .pill {
      padding: 10px 15px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.22);
      color: white;
      font-size: 18px;
      font-weight: 950;
      white-space: nowrap;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 16px;
    }

    .panel {
      min-height: 0;
      border-radius: 32px;
      background: rgba(255,255,255,.94);
      box-shadow: 0 22px 60px rgba(0,0,0,.28);
      overflow: hidden;
    }

    .cloud {
      padding: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      align-content: center;
      flex-wrap: wrap;
      gap: 18px 24px;
      overflow: auto;
    }

    .word {
      display: inline-flex;
      align-items: center;
      gap: .18em;
      font-weight: 950;
      line-height: 1;
      letter-spacing: -.06em;
      text-shadow: 0 10px 26px rgba(15,23,42,.16);
      padding: 4px 8px;
      border-radius: 18px;
    }

    .count {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-width: 1.5em;
      height: 1.5em;
      border-radius: 999px;
      background: rgba(37,99,235,.12);
      color: #1d4ed8;
      font-size: .32em;
      letter-spacing: 0;
    }

    .side {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .sideHeader {
      padding: 18px 20px 12px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: 950;
    }

    .participants {
      padding: 14px;
      overflow: auto;
    }

    .person {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 8px 10px;
      margin-bottom: 8px;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      font-size: 18px;
      font-weight: 900;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #dbeafe;
      color: #1d4ed8;
      display: grid;
      place-items: center;
      font-weight: 950;
      flex: 0 0 auto;
    }

    .footer {
      color: rgba(255,255,255,.75);
      font-size: 15px;
      font-weight: 800;
      display: flex;
      justify-content: space-between;
    }

    .empty {
      width: 100%;
      text-align: center;
      color: #64748b;
      font-size: 34px;
      font-weight: 950;
      line-height: 1.5;
    }

    .emptySmall {
      font-size: 20px;
      color: #94a3b8;
      margin-top: 8px;
    }

    .OPEN { background: rgba(22,163,74,.2); }
    .PAUSED { background: rgba(245,158,11,.22); }
    .CLOSED { background: rgba(220,38,38,.22); }
  </style>
</head>

<body>
  <main class="layout">
    <header class="top">
      <div>
        <div id="sessionName" class="sessionName">即時文字雲</div>
        <div id="questionText" class="question">載入中...</div>
      </div>

      <div class="statusBox">
        <div id="statusPill" class="pill">同步中</div>
        <div id="questionNo" class="pill">第 - 題</div>
      </div>
    </header>

    <section class="main">
      <section id="cloud" class="panel cloud">
        <div class="empty">
          尚未有文字
          <div class="emptySmall">等待使用者送出</div>
        </div>
      </section>

      <aside id="sidePanel" class="panel side">
        <div class="sideHeader">
          <span>參與名單</span>
          <span id="participantCount">0 人</span>
        </div>

        <div id="participants" class="participants"></div>
      </aside>
    </section>

    <footer class="footer">
      <div id="summary">回應數：0｜文字數：0</div>
      <div id="updatedAt">尚未同步</div>
    </footer>
  </main>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyTI59BqySn3IyAAq12ihYPoC6qinlx4cr4YA5lE2m8ZkdlumzvhYEDy2EPgRyjJnFv/exec';

    const colors = [
      '#0f172a',
      '#1d4ed8',
      '#047857',
      '#b45309',
      '#be123c',
      '#6d28d9',
      '#0369a1',
      '#15803d',
      '#c2410c'
    ];

    let timer = null;
    let refreshing = false;

    document.addEventListener('DOMContentLoaded', refresh);

    async function refresh() {
      if (refreshing) return;
      refreshing = true;

      try {
        const data = await gas('getDisplayState');

        render(data);

        const seconds = Number(data.refreshSeconds || 1);

        clearTimeout(timer);
        timer = setTimeout(refresh, Math.max(1, seconds) * 1000);

      } catch (err) {
        document.getElementById('updatedAt').textContent = '同步失敗，稍後重試';
        clearTimeout(timer);
        timer = setTimeout(refresh, 3000);
      } finally {
        refreshing = false;
      }
    }

    function render(data) {
      const q = data.question || {};

      document.getElementById('sessionName').textContent = data.session.sessionName || '即時文字雲';
      document.getElementById('questionText').textContent = q.questionText || '尚未設定題目';
      document.getElementById('questionNo').textContent = q.questionNo ? '第 ' + q.questionNo + ' 題' : '目前題目';

      const statusPill = document.getElementById('statusPill');
      statusPill.textContent = statusText(data.systemStatus);
      statusPill.className = 'pill ' + data.systemStatus;

      document.getElementById('participantCount').textContent = data.participantCount + ' 人';
      document.getElementById('summary').textContent =
        '回應數：' + data.responseCount + '｜文字數：' + data.uniqueWordCount;

      document.getElementById('updatedAt').textContent =
        '最後同步：' + new Date().toLocaleTimeString('zh-TW', { hour12: false });

      renderCloud(data.words || []);
      renderParticipants(data.participants || [], data.showParticipants);
    }

    function renderCloud(words) {
      const cloud = document.getElementById('cloud');

      if (!words.length) {
        cloud.innerHTML = `
          <div class="empty">
            尚未有文字
            <div class="emptySmall">等待使用者送出</div>
          </div>
        `;
        return;
      }

      const counts = words.map(w => Number(w.count || 0));
      const max = Math.max.apply(null, counts);
      const min = Math.min.apply(null, counts);
      const minSize = 34;
      const maxSize = 108;
      const rotateList = [-6, 3, 0, 5, -3, 7, -5, 2];

      cloud.innerHTML = words.map((w, i) => {
        const count = Number(w.count || 0);
        const ratio = max === min ? .55 : (count - min) / (max - min);
        const size = Math.round(minSize + Math.sqrt(ratio) * (maxSize - minSize));
        const rotate = rotateList[i % rotateList.length];
        const color = colors[i % colors.length];

        return `
          <div class="word" style="font-size:${size}px;color:${color};transform:rotate(${rotate}deg);">
            ${escapeHtml(w.text)}
            <span class="count">${count}</span>
          </div>
        `;
      }).join('');
    }

    function renderParticipants(items, showParticipants) {
      const sidePanel = document.getElementById('sidePanel');
      const box = document.getElementById('participants');

      sidePanel.style.display = showParticipants ? 'grid' : 'none';

      if (!items.length) {
        box.innerHTML = '<div class="emptySmall">尚未有人加入</div>';
        return;
      }

      box.innerHTML = items.map(p => `
        <div class="person">
          <div class="avatar">${escapeHtml(initial(p.nickname))}</div>
          <div>${escapeHtml(p.nickname)}</div>
        </div>
      `).join('');
    }

    function statusText(status) {
      if (status === 'OPEN') return '開放中';
      if (status === 'PAUSED') return '暫停';
      if (status === 'CLOSED') return '已截止';
      return status || '';
    }

    function initial(name) {
      const arr = Array.from(String(name || ''));
      return arr[0] || '人';
    }

    function gas(fn, payload) {
      return jsonp(GAS_API_URL, fn, payload);
    }

    function jsonp(baseUrl, api, payload) {
      return new Promise((resolve, reject) => {
        const callbackName = '__wc_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');

        const params = new URLSearchParams();
        params.set('api', api);
        params.set('callback', callbackName);
        params.set('_', String(Date.now()));

        if (payload !== undefined) {
          params.set('payload', JSON.stringify(payload));
        }

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('連線逾時，請稍後再試'));
        }, 15000);

        function cleanup() {
          clearTimeout(timer);
          delete window[callbackName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        window[callbackName] = data => {
          cleanup();

          if (!data || data.ok === false) {
            reject(new Error(data && data.message ? data.message : 'API 執行失敗'));
            return;
          }

          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('無法連線到後端 API'));
        };

        script.src = baseUrl + '?' + params.toString();
        document.head.appendChild(script);
      });
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
