<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>文字雲投影</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at 10% 15%, rgba(59, 130, 246, .35), transparent 30%),
        radial-gradient(circle at 88% 20%, rgba(168, 85, 247, .28), transparent 30%),
        #0f172a;
      color: #0f172a;
    }

    .layout {
      width: 100vw;
      width: 100dvw;
      height: 100vh;
      height: 100dvh;
      padding: 22px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 16px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      min-height: 0;
      color: white;
    }

    .brandMark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding: 7px 12px 7px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .18);
      color: rgba(255, 255, 255, .9);
      font-size: 17px;
      font-weight: 950;
      letter-spacing: .02em;
      width: fit-content;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .16);
    }

    .brandIcon {
      position: relative;
      width: 28px;
      height: 28px;
      flex: 0 0 auto;
      display: inline-block;
    }

    .brandIcon::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      width: 14px;
      height: 14px;
      border-radius: 5px;
      background: linear-gradient(135deg, #60a5fa, #2563eb);
      transform: rotate(45deg);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, .35);
    }

    .brandIcon::after {
      content: "";
      position: absolute;
      right: 1px;
      bottom: 1px;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c084fc, #7c3aed);
      box-shadow:
        -12px 8px 0 -3px #22c55e,
        0 0 0 1px rgba(255, 255, 255, .35);
    }

    .sessionName {
      font-size: 22px;
      font-weight: 900;
      color: rgba(255, 255, 255, .75);
      margin-bottom: 6px;
    }

    .question {
      font-size: 42px;
      line-height: 1.18;
      font-weight: 950;
      letter-spacing: -.05em;
    }

    .statusBox {
      flex: 0 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .pill {
      padding: 10px 15px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .14);
      border: 1px solid rgba(255, 255, 255, .22);
      color: white;
      font-size: 18px;
      font-weight: 950;
      white-space: nowrap;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 16px;
    }

    .main.hideSide {
      grid-template-columns: minmax(0, 1fr);
    }

    .panel {
      min-width: 0;
      min-height: 0;
      border-radius: 32px;
      background: rgba(255, 255, 255, .94);
      box-shadow: 0 22px 60px rgba(0, 0, 0, .28);
      overflow: hidden;
    }

    .cloud {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .cloudViewport {
      position: absolute;
      inset: 0;
      padding: clamp(18px, 2vw, 34px);
      overflow: hidden;
    }

    .cloudStage {
      position: absolute;
      left: 0;
      top: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      align-content: center;
      transform-origin: 0 0;
      will-change: transform, left, top;
    }

    .word {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      max-width: 100%;
      flex: 0 1 auto;
      gap: .18em;
      font-weight: 950;
      line-height: 1.06;
      letter-spacing: -.06em;
      text-align: center;
      text-shadow: 0 10px 26px rgba(15, 23, 42, .16);
      border-radius: 18px;
      transform-origin: center center;
      overflow: visible;
    }

    .wordText {
      min-width: 0;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .count {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      flex: 0 0 auto;
      min-width: 1.45em;
      height: 1.45em;
      padding: 0 .18em;
      border-radius: 999px;
      background: rgba(37, 99, 235, .12);
      color: #1d4ed8;
      font-size: .32em;
      line-height: 1;
      letter-spacing: 0;
    }

    .side {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .sideHeader {
      padding: 18px 20px 12px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-weight: 950;
    }

    .participants {
      padding: 14px;
      overflow: auto;
    }

    .person {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 8px 10px;
      margin-bottom: 8px;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      font-size: 18px;
      font-weight: 900;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #dbeafe;
      color: #1d4ed8;
      display: grid;
      place-items: center;
      font-weight: 950;
      flex: 0 0 auto;
    }

    .footer {
      color: rgba(255, 255, 255, .75);
      font-size: 15px;
      font-weight: 800;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-content: center;
      padding: 24px;
      text-align: center;
      color: #64748b;
      font-size: 34px;
      font-weight: 950;
      line-height: 1.5;
    }

    .emptySmall {
      font-size: 20px;
      color: #94a3b8;
      margin-top: 8px;
    }

    .OPEN {
      background: rgba(22, 163, 74, .2);
    }

    .PAUSED {
      background: rgba(245, 158, 11, .22);
    }

    .CLOSED {
      background: rgba(220, 38, 38, .22);
    }

    @media (max-width: 900px) {
      .layout {
        padding: 14px;
        gap: 12px;
      }

      .top {
        flex-direction: column;
      }

      .brandMark {
        font-size: 15px;
      }

      .question {
        font-size: 32px;
      }

      .main {
        grid-template-columns: minmax(0, 1fr);
      }

      .side {
        display: none !important;
      }

      .footer {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <main class="layout">
    <header class="top">
      <div>
        <div class="brandMark">
          <span class="brandIcon" aria-hidden="true"></span>
          <span>KHYP文字雲</span>
        </div>

        <div id="sessionName" class="sessionName">即時文字雲</div>
        <div id="questionText" class="question">載入中...</div>
      </div>

      <div class="statusBox">
        <div id="statusPill" class="pill">同步中</div>
        <div id="questionNo" class="pill">第 - 題</div>
      </div>
    </header>

    <section id="main" class="main">
      <section id="cloud" class="panel cloud">
        <div id="cloudViewport" class="cloudViewport">
          <div class="empty">
            尚未有文字
            <div class="emptySmall">等待使用者送出</div>
          </div>
        </div>
      </section>

      <aside id="sidePanel" class="panel side">
        <div class="sideHeader">
          <span>參與名單</span>
          <span id="participantCount">0 人</span>
        </div>

        <div id="participants" class="participants"></div>
      </aside>
    </section>

    <footer class="footer">
      <div id="summary">回應數：0｜文字數：0</div>
      <div id="updatedAt">尚未同步</div>
    </footer>
  </main>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyTI59BqySn3IyAAq12ihYPoC6qinlx4cr4YA5lE2m8ZkdlumzvhYEDy2EPgRyjJnFv/exec';

    const DISPLAY_SYNC_MS = 1000;
    const DISPLAY_ERROR_RETRY_MS = 3000;

    const colors = [
      '#0f172a',
      '#1d4ed8',
      '#047857',
      '#b45309',
      '#be123c',
      '#6d28d9',
      '#0369a1',
      '#15803d',
      '#c2410c'
    ];

    const rotateList = [-8, 5, -4, 7, -6, 3, -2, 6, -7, 4, -5, 2];

    let timer = null;
    let refreshing = false;
    let lastFrameSignature = '';
    let lastCloudSignature = '';
    let lastParticipantsSignature = '';
    let cloudFitFrame = null;
    let cloudResizeObserver = null;

    document.addEventListener('DOMContentLoaded', () => {
      observeCloudResize();
      refresh();
    });

    window.addEventListener('resize', scheduleCloudFit);
    window.addEventListener('orientationchange', scheduleCloudFit);

    window.addEventListener('beforeunload', () => {
      if (timer) {
        clearTimeout(timer);
      }

      if (cloudFitFrame) {
        cancelAnimationFrame(cloudFitFrame);
      }

      if (cloudResizeObserver) {
        cloudResizeObserver.disconnect();
      }
    });

    function observeCloudResize() {
      const cloudViewport = document.getElementById('cloudViewport');

      if (!cloudViewport || !window.ResizeObserver) {
        return;
      }

      cloudResizeObserver = new ResizeObserver(() => {
        scheduleCloudFit();
      });

      cloudResizeObserver.observe(cloudViewport);
    }

    function scheduleNextRefresh(delay) {
      if (timer) {
        clearTimeout(timer);
      }

      timer = setTimeout(refresh, delay || DISPLAY_SYNC_MS);
    }

    async function refresh() {
      if (refreshing) {
        scheduleNextRefresh(500);
        return;
      }

      refreshing = true;

      try {
        const data = await gas('getDisplayState');

        render(data);

        scheduleNextRefresh(
          Math.max(1, Number(data.refreshSeconds || 1)) * 1000
        );

      } catch (err) {
        document.getElementById('updatedAt').textContent = '同步失敗，稍後重試';
        scheduleNextRefresh(DISPLAY_ERROR_RETRY_MS);

      } finally {
        refreshing = false;
      }
    }

    function render(data) {
      updateSyncTime();

      const frameSignature = getFrameSignature(data);

      if (frameSignature !== lastFrameSignature) {
        lastFrameSignature = frameSignature;
        renderFrame(data);
      }

      const cloudSignature = getCloudSignature(data.words || []);

      if (cloudSignature !== lastCloudSignature) {
        lastCloudSignature = cloudSignature;
        renderCloud(data.words || []);
      }

      const participantsSignature = getParticipantsSignature(
        data.participants || [],
        data.showParticipants
      );

      if (participantsSignature !== lastParticipantsSignature) {
        lastParticipantsSignature = participantsSignature;
        renderParticipants(data.participants || [], data.showParticipants);
      }
    }

    function renderFrame(data) {
      const question = data.question || {};
      const session = data.session || {};

      document.getElementById('sessionName').textContent =
        session.sessionName || '即時文字雲';

      document.getElementById('questionText').textContent =
        question.questionText || '尚未設定題目';

      document.getElementById('questionNo').textContent =
        question.questionNo ? '第 ' + question.questionNo + ' 題' : '目前題目';

      const statusPill = document.getElementById('statusPill');

      statusPill.textContent = statusText(data.systemStatus);
      statusPill.className = 'pill ' + safeStatusClass(data.systemStatus);

      document.getElementById('participantCount').textContent =
        toSafeNumber(data.participantCount) + ' 人';

      document.getElementById('summary').textContent =
        '回應數：' +
        toSafeNumber(data.responseCount) +
        '｜文字數：' +
        toSafeNumber(data.uniqueWordCount);
    }

    function updateSyncTime() {
      document.getElementById('updatedAt').textContent =
        '最後同步：' + new Date().toLocaleTimeString('zh-TW', {
          hour12: false
        });
    }

    function renderCloud(words) {
      const viewport = document.getElementById('cloudViewport');

      const safeWords = Array.isArray(words)
        ? words
          .map(word => ({
            text: String(word && word.text != null ? word.text : '').trim(),
            count: toSafeNumber(word && word.count)
          }))
          .filter(word => word.text)
        : [];

      if (!safeWords.length) {
        viewport.innerHTML = `
          <div class="empty">
            尚未有文字
            <div class="emptySmall">等待使用者送出</div>
          </div>
        `;
        return;
      }

      const counts = safeWords.map(word => word.count);
      const maxCount = Math.max.apply(null, counts);
      const minCount = Math.min.apply(null, counts);

      viewport.innerHTML = `
        <div id="cloudStage" class="cloudStage">
          ${safeWords.map((word, index) => {
            const ratio = maxCount === minCount
              ? 0.58
              : (word.count - minCount) / (maxCount - minCount);

            const sizeWeight =
              0.62 + Math.pow(Math.max(0, ratio), 0.58) * 0.88;

            const color = colors[index % colors.length];
            const rotate = rotateList[index % rotateList.length];

            return `
              <div
                class="word"
                data-size-weight="${sizeWeight.toFixed(4)}"
                style="color:${color};transform:rotate(${rotate}deg);"
              >
                <span class="wordText">${escapeHtml(word.text)}</span>
                <span class="count">${word.count}</span>
              </div>
            `;
          }).join('')}
        </div>
      `;

      scheduleCloudFit();
    }

    function scheduleCloudFit() {
      if (cloudFitFrame) {
        cancelAnimationFrame(cloudFitFrame);
      }

      cloudFitFrame = requestAnimationFrame(() => {
        cloudFitFrame = null;
        fitCloudToCanvas();
      });
    }

    function fitCloudToCanvas() {
      const viewport = document.getElementById('cloudViewport');
      const stage = document.getElementById('cloudStage');

      if (!viewport || !stage) {
        return;
      }

      const availableWidth = viewport.clientWidth;
      const availableHeight = viewport.clientHeight;

      if (availableWidth < 40 || availableHeight < 40) {
        return;
      }

      const wordElements = Array.from(stage.querySelectorAll('.word'));

      if (!wordElements.length) {
        return;
      }

      stage.style.left = '0px';
      stage.style.top = '0px';
      stage.style.width = availableWidth + 'px';
      stage.style.transform = 'none';

      const maxBaseSize = Math.max(
        30,
        Math.min(
          320,
          Math.max(availableWidth, availableHeight) * 0.42
        )
      );

      const minBaseSize = 6;
      let low = minBaseSize;
      let high = maxBaseSize;
      let best = minBaseSize;

      for (let index = 0; index < 15; index += 1) {
        const middle = (low + high) / 2;

        applyCloudTypography(stage, middle);

        const contentBounds = getCloudContentBounds(
          stage,
          wordElements,
          Math.max(4, middle * 0.08)
        );

        const isFit =
          contentBounds.width <= availableWidth &&
          contentBounds.height <= availableHeight;

        if (isFit) {
          best = middle;
          low = middle;
        } else {
          high = middle;
        }
      }

      applyCloudTypography(stage, best);

      const finalBounds = getCloudContentBounds(
        stage,
        wordElements,
        Math.max(4, best * 0.08)
      );

      const scale = Math.min(
        1,
        availableWidth / Math.max(1, finalBounds.width),
        availableHeight / Math.max(1, finalBounds.height)
      );

      const safeScale = Math.max(0.03, scale);

      const left =
        (availableWidth - finalBounds.width * safeScale) / 2 -
        finalBounds.left * safeScale;

      const top =
        (availableHeight - finalBounds.height * safeScale) / 2 -
        finalBounds.top * safeScale;

      stage.style.left = left.toFixed(2) + 'px';
      stage.style.top = top.toFixed(2) + 'px';
      stage.style.transform = 'scale(' + safeScale.toFixed(4) + ')';
    }

    function applyCloudTypography(stage, baseSize) {
      const words = Array.from(stage.querySelectorAll('.word'));

      const columnGap = Math.max(5, Math.round(baseSize * 0.19));
      const rowGap = Math.max(5, Math.round(baseSize * 0.15));

      stage.style.columnGap = columnGap + 'px';
      stage.style.rowGap = rowGap + 'px';

      words.forEach(word => {
        const sizeWeight = Number(word.dataset.sizeWeight || 1);
        const fontSize = Math.max(6, baseSize * sizeWeight);
        const paddingY = Math.max(1, Math.round(fontSize * 0.03));
        const paddingX = Math.max(2, Math.round(fontSize * 0.06));

        word.style.fontSize = fontSize.toFixed(2) + 'px';
        word.style.padding = paddingY + 'px ' + paddingX + 'px';
      });
    }

    function getCloudContentBounds(stage, wordElements, safetyPadding) {
      const stageRect = stage.getBoundingClientRect();

      let left = Infinity;
      let top = Infinity;
      let right = -Infinity;
      let bottom = -Infinity;

      wordElements.forEach(word => {
        const rect = word.getBoundingClientRect();

        left = Math.min(left, rect.left - stageRect.left);
        top = Math.min(top, rect.top - stageRect.top);
        right = Math.max(right, rect.right - stageRect.left);
        bottom = Math.max(bottom, rect.bottom - stageRect.top);
      });

      if (
        !Number.isFinite(left) ||
        !Number.isFinite(top) ||
        !Number.isFinite(right) ||
        !Number.isFinite(bottom)
      ) {
        return {
          left: 0,
          top: 0,
          width: 1,
          height: 1
        };
      }

      const padding = Number(safetyPadding) || 0;

      return {
        left: left - padding,
        top: top - padding,
        width: Math.max(1, right - left + padding * 2),
        height: Math.max(1, bottom - top + padding * 2)
      };
    }

    function renderParticipants(items, showParticipants) {
      const main = document.getElementById('main');
      const sidePanel = document.getElementById('sidePanel');
      const box = document.getElementById('participants');

      const shouldShow = normalizeBoolean(showParticipants, true);

      sidePanel.style.display = shouldShow ? 'grid' : 'none';
      main.classList.toggle('hideSide', !shouldShow);

      if (!shouldShow) {
        box.innerHTML = '';
        scheduleCloudFit();
        return;
      }

      if (!items.length) {
        box.innerHTML = '<div class="emptySmall">尚未有人加入</div>';
        scheduleCloudFit();
        return;
      }

      box.innerHTML = items.map(person => {
        return `
          <div class="person">
            <div class="avatar">${escapeHtml(initial(person.nickname))}</div>
            <div>${escapeHtml(person.nickname)}</div>
          </div>
        `;
      }).join('');

      scheduleCloudFit();
    }

    function getFrameSignature(data) {
      const question = data.question || {};
      const session = data.session || {};

      return JSON.stringify({
        sessionName: session.sessionName || '',
        systemStatus: data.systemStatus || '',
        questionId: question.questionId || '',
        questionText: question.questionText || '',
        questionNo: question.questionNo || 0,
        participantCount: data.participantCount || 0,
        responseCount: data.responseCount || 0,
        uniqueWordCount: data.uniqueWordCount || 0
      });
    }

    function getCloudSignature(words) {
      return JSON.stringify(
        (words || []).map(word => ({
          text: word.text || '',
          count: Number(word.count || 0)
        }))
      );
    }

    function getParticipantsSignature(items, showParticipants) {
      return JSON.stringify({
        showParticipants: normalizeBoolean(showParticipants, true),
        items: (items || []).map(person => ({
          clientId: person.clientId || '',
          nickname: person.nickname || ''
        }))
      });
    }

    function statusText(status) {
      if (status === 'OPEN') return '開放中';
      if (status === 'PAUSED') return '暫停';
      if (status === 'CLOSED') return '已截止';

      return status || '';
    }

    function safeStatusClass(status) {
      if (status === 'OPEN') return 'OPEN';
      if (status === 'PAUSED') return 'PAUSED';
      if (status === 'CLOSED') return 'CLOSED';

      return '';
    }

    function initial(name) {
      const chars = Array.from(String(name || ''));
      return chars[0] || '人';
    }

    function gas(fn, payload) {
      return jsonp(GAS_API_URL, fn, payload);
    }

    function jsonp(baseUrl, api, payload) {
      return new Promise((resolve, reject) => {
        const callbackName =
          '__wc_cb_' +
          Date.now() +
          '_' +
          Math.random().toString(36).slice(2);

        const script = document.createElement('script');
        const params = new URLSearchParams();

        params.set('api', api);
        params.set('callback', callbackName);
        params.set('_', String(Date.now()));

        if (payload !== undefined) {
          params.set('payload', JSON.stringify(payload));
        }

        const requestTimer = setTimeout(() => {
          cleanup();
          reject(new Error('連線逾時，請稍後再試'));
        }, 15000);

        function cleanup() {
          clearTimeout(requestTimer);
          delete window[callbackName];

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = data => {
          cleanup();

          if (!data || data.ok === false) {
            reject(new Error(data && data.message ? data.message : 'API 執行失敗'));
            return;
          }

          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('無法連線到後端 API'));
        };

        script.src = baseUrl + '?' + params.toString();
        document.head.appendChild(script);
      });
    }

    function normalizeBoolean(value, defaultValue) {
      if (value === true) return true;
      if (value === false) return false;

      const text = String(value == null ? '' : value).trim().toUpperCase();

      if (['TRUE', 'YES', 'Y', '1'].includes(text)) return true;
      if (['FALSE', 'NO', 'N', '0'].includes(text)) return false;

      return !!defaultValue;
    }

    function toSafeNumber(value) {
      const number = Number(value);

      return Number.isFinite(number)
        ? number
        : 0;
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
