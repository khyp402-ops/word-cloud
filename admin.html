<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>文字雲後台</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f1f5f9;
      color: #0f172a;
    }

    body {
      padding: 18px;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: -.04em;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, .08);
      margin-bottom: 16px;
    }

    .cardTitle {
      font-size: 22px;
      font-weight: 950;
      margin-bottom: 14px;
    }

    .cardHeader {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .cardHeaderText .cardTitle {
      margin-bottom: 6px;
    }

    .cardHeaderText .hint {
      margin: 0;
    }

    .headerAction {
      flex: 0 0 auto;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 900;
      color: #334155;
      margin: 12px 0 6px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      padding: 12px;
      font-size: 16px;
      outline: none;
      background: white;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }

    .btnRow {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      background: #2563eb;
      color: white;
      font-weight: 950;
      font-size: 15px;
      cursor: pointer;
    }

    button.secondary {
      background: #475569;
    }

    button.success {
      background: #16a34a;
    }

    button.warning {
      background: #d97706;
    }

    button.danger {
      background: #dc2626;
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      font-weight: 900;
      color: #64748b;
      min-height: 22px;
    }

    .status.error {
      color: #dc2626;
    }

    .status.success {
      color: #16a34a;
    }

    .note {
      margin-top: 8px;
      color: #64748b;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }

    th,
    td {
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 8px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: #334155;
      font-size: 13px;
      background: #f8fafc;
    }

    .dragCell {
      width: 46px;
      text-align: center;
      color: #64748b;
      font-size: 22px;
      font-weight: 950;
      cursor: grab;
      user-select: none;
    }

    .dragCell:active {
      cursor: grabbing;
    }

    tr.dragging {
      opacity: .45;
      background: #dbeafe;
    }

    tr.dropTarget {
      outline: 3px solid #2563eb;
      outline-offset: -3px;
      background: #eff6ff;
    }

    tr.activeRow {
      background: #f8fafc;
    }

    .pill {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 950;
      background: #e2e8f0;
      color: #334155;
    }

    .OPEN {
      background: #dcfce7;
      color: #166534;
    }

    .PAUSED,
    .DRAFT {
      background: #fef3c7;
      color: #92400e;
    }

    .CLOSED {
      background: #fee2e2;
      color: #991b1b;
    }

    .miniBtn {
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      margin: 0 4px 6px 0;
    }

    .summaryGrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .summaryItem {
      background: #f8fafc;
      border-radius: 16px;
      padding: 14px;
      text-align: center;
    }

    .summaryNum {
      font-size: 28px;
      font-weight: 950;
    }

    .summaryText {
      font-size: 13px;
      color: #64748b;
      font-weight: 900;
      margin-top: 4px;
    }

    .remoteLink {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      border-radius: 14px;
      padding: 12px 16px;
      background: #7c3aed;
      color: white;
      font-weight: 950;
      font-size: 15px;
    }

    .hint {
      color: #64748b;
      font-size: 13px;
      font-weight: 800;
      margin-top: -4px;
      margin-bottom: 10px;
    }

    .modalOverlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 23, 42, .68);
      z-index: 9999;
    }

    .modalOverlay.show {
      display: flex;
    }

    .modal {
      width: min(560px, 100%);
      max-height: calc(100dvh - 36px);
      overflow: auto;
      background: #ffffff;
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, .35);
    }

    .modalHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .modalTitle {
      font-size: 24px;
      font-weight: 950;
      letter-spacing: -.03em;
    }

    .closeBtn {
      width: 42px;
      height: 42px;
      padding: 0;
      border-radius: 50%;
      background: #e2e8f0;
      color: #0f172a;
      font-size: 24px;
      line-height: 1;
    }

    .modalFooter {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    @media (max-width: 860px) {
      body {
        padding: 12px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .top {
        align-items: flex-start;
        flex-direction: column;
      }

      .summaryGrid {
        grid-template-columns: 1fr 1fr;
      }

      table {
        font-size: 14px;
      }

      .modal {
        border-radius: 22px;
        padding: 18px;
      }

      .cardHeader {
        flex-direction: column;
      }

      .headerAction,
      .headerAction button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header class="top">
      <h1>文字雲後台管理</h1>

      <div class="btnRow">
        <a id="remoteLink" class="remoteLink" target="_blank">主持遙控器</a>
        <button type="button" onclick="refresh()">重新整理</button>
        <button type="button" class="success" onclick="applySystemStatus('OPEN')">開放送出</button>
        <button type="button" class="warning" onclick="applySystemStatus('PAUSED')">暫停送出</button>
      </div>
    </header>

    <section class="grid">
      <aside>
        <section class="card">
          <div class="cardTitle">活動設定</div>

          <label for="sessionName">活動名稱</label>
          <input id="sessionName" />

          <label for="systemStatus">系統狀態</label>
          <select id="systemStatus">
            <option value="OPEN">開放中</option>
            <option value="PAUSED">暫停</option>
          </select>

          <label for="showParticipants">顯示參與名單</label>
          <select id="showParticipants">
            <option value="TRUE">顯示</option>
            <option value="FALSE">隱藏</option>
          </select>

          <label for="answerMaxChars">使用者作答字數限制</label>
          <select id="answerMaxChars">
            <option value="1">1 字</option>
            <option value="2">2 字</option>
            <option value="3">3 字</option>
            <option value="4">4 字</option>
            <option value="5">5 字</option>
            <option value="6">6 字</option>
            <option value="7">7 字</option>
            <option value="8">8 字</option>
            <option value="9">9 字</option>
            <option value="10">10 字</option>
          </select>
          <div class="note">此限制套用於本活動全部題目；修改後立即同步套用到已建立與之後新增的題目。</div>

          <div class="btnRow">
            <button type="button" onclick="saveSettings()">儲存設定</button>
          </div>

          <div id="settingStatus" class="status"></div>
        </section>

        <section class="card">
          <div class="cardTitle">清空資料</div>

          <div class="btnRow">
            <button type="button" class="warning" onclick="clearCurrent()">清空目前題目回應</button>
            <button type="button" class="danger" onclick="clearQuestions()">清空全部題目</button>
            <button type="button" class="danger" onclick="clearAll()">清空全部活動資料</button>
            <button type="button" class="secondary" onclick="rebuildStats()">重建統計</button>
          </div>

          <div id="clearStatus" class="status"></div>
        </section>
      </aside>

      <section>
        <section class="card">
          <div class="cardTitle">目前狀態</div>

          <div class="summaryGrid">
            <div class="summaryItem">
              <div id="participantCount" class="summaryNum">0</div>
              <div class="summaryText">參與人數</div>
            </div>

            <div class="summaryItem">
              <div id="responseCount" class="summaryNum">0</div>
              <div class="summaryText">回應數</div>
            </div>

            <div class="summaryItem">
              <div id="approvedCount" class="summaryNum">0</div>
              <div class="summaryText">已顯示</div>
            </div>

            <div class="summaryItem">
              <div id="uniqueWordCount" class="summaryNum">0</div>
              <div class="summaryText">文字數</div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="cardHeader">
            <div class="cardHeaderText">
              <div class="cardTitle">題目清單</div>
              <div class="hint">拖曳左側「☰」即可調整題目排序，排序會自動儲存。作答字數由左側「活動設定」統一控制。</div>
            </div>

            <div class="headerAction">
              <button type="button" class="success" onclick="openQuestionModalForCreate()">新增題目</button>
            </div>
          </div>

          <div style="overflow:auto;">
            <table>
              <thead>
                <tr>
                  <th style="width:46px;">排序</th>
                  <th style="width:58px;">題號</th>
                  <th>題目</th>
                  <th>狀態</th>
                  <th>限制</th>
                  <th>操作</th>
                </tr>
              </thead>

              <tbody id="questionTable"></tbody>
            </table>
          </div>

          <div id="sortStatus" class="status"></div>
          <div id="questionStatusMsg" class="status"></div>
        </section>

        <section class="card">
          <div class="cardTitle">目前文字排行</div>

          <div style="overflow:auto;">
            <table>
              <thead>
                <tr>
                  <th>文字</th>
                  <th>次數</th>
                </tr>
              </thead>

              <tbody id="wordTable"></tbody>
            </table>
          </div>
        </section>
      </section>
    </section>
  </main>

  <section id="questionModal" class="modalOverlay" onclick="closeQuestionModalByOverlay(event)">
    <div class="modal">
      <div class="modalHeader">
        <div id="questionModalTitle" class="modalTitle">新增題目</div>
        <button type="button" class="closeBtn" onclick="closeQuestionModal()">×</button>
      </div>

      <input id="editQuestionId" type="hidden" />

      <label for="editQuestionText">題目文字</label>
      <textarea id="editQuestionText" placeholder="輸入題目文字"></textarea>

      <label for="editQuestionStatus">題目狀態</label>
      <select id="editQuestionStatus">
        <option value="OPEN">開放</option>
        <option value="CLOSED">關閉</option>
        <option value="DRAFT">草稿</option>
      </select>

      <label for="editMaxResponsesPerUser">每人最多回應</label>
      <select id="editMaxResponsesPerUser">
        <option value="1">1 次</option>
        <option value="2">2 次</option>
        <option value="3">3 次</option>
        <option value="4">4 次</option>
        <option value="5">5 次</option>
      </select>

      <label for="editShowInCloud">是否顯示文字雲</label>
      <select id="editShowInCloud">
        <option value="TRUE">顯示</option>
        <option value="FALSE">不顯示</option>
      </select>

      <label for="editAllowDuplicateWord">允許同一人重複送出同詞</label>
      <select id="editAllowDuplicateWord">
        <option value="FALSE">不允許</option>
        <option value="TRUE">允許</option>
      </select>

      <label for="editNeedApproval">是否需要審核</label>
      <select id="editNeedApproval">
        <option value="FALSE">直接顯示</option>
        <option value="TRUE">需審核</option>
      </select>

      <div class="modalFooter">
        <button type="button" class="secondary" onclick="closeQuestionModal()">取消</button>
        <button type="button" id="questionModalSaveBtn" onclick="saveQuestionFromModal()">儲存題目</button>
      </div>

      <div id="editStatusMsg" class="status"></div>
    </div>
  </section>

  <script>
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbyTI59BqySn3IyAAq12ihYPoC6qinlx4cr4YA5lE2m8ZkdlumzvhYEDy2EPgRyjJnFv/exec';

    const LIVE_SYNC_MS = 1000;
    const FULL_SYNC_MS = 8000;
    const ERROR_RETRY_MS = 3000;

    let adminState = null;
    let draggedQuestionId = null;
    let sortingBusy = false;
    let adminBusy = false;
    let syncing = false;
    let autoTimer = null;
    let questionModalMode = 'create';
    let lastFullSyncAt = 0;
    let lastLiveSignature = '';
    let lastQuestionListSignature = '';

    document.addEventListener('DOMContentLoaded', boot);

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') {
        closeQuestionModal();
      }
    });

    window.addEventListener('beforeunload', () => {
      if (autoTimer) {
        clearTimeout(autoTimer);
      }
    });

    async function boot() {
      setRemoteLink();

      try {
        await loadFullState(true, false);
        scheduleNextSync(LIVE_SYNC_MS);
      } catch (err) {
        alert(messageOf(err));
        scheduleNextSync(ERROR_RETRY_MS);
      }
    }

    function setRemoteLink() {
      document.getElementById('remoteLink').href =
        new URL('remote.html', window.location.href).toString();
    }

    function normalizeSystemStatusForUi(status) {
      return status === 'OPEN' ? 'OPEN' : 'PAUSED';
    }

    function scheduleNextSync(delay) {
      if (autoTimer) {
        clearTimeout(autoTimer);
      }

      autoTimer = setTimeout(syncAdminState, delay || LIVE_SYNC_MS);
    }

    async function refresh() {
      try {
        await loadFullState(true, false);
        scheduleNextSync(LIVE_SYNC_MS);
      } catch (err) {
        alert(messageOf(err));
      }
    }

    async function syncAdminState() {
      if (adminBusy || sortingBusy || syncing) {
        scheduleNextSync(600);
        return;
      }

      syncing = true;

      try {
        if (!adminState || Date.now() - lastFullSyncAt >= FULL_SYNC_MS) {
          await loadFullState(false, true);
        } else {
          await loadLiveState();
        }

        scheduleNextSync(LIVE_SYNC_MS);

      } catch (err) {
        scheduleNextSync(ERROR_RETRY_MS);

      } finally {
        syncing = false;
      }
    }

    async function loadFullState(updateForm, silent) {
      const data = await gas('getAdminState');

      adminState = data;
      lastFullSyncAt = Date.now();
      lastLiveSignature = '';

      renderFull(data, updateForm);

      if (!silent) {
        setMsg('questionStatusMsg', '已同步完整資料', 'success');

        setTimeout(() => {
          const el = document.getElementById('questionStatusMsg');

          if (el && el.textContent === '已同步完整資料') {
            setMsg('questionStatusMsg', '', '');
          }
        }, 900);
      }
    }

    async function loadLiveState() {
      const data = await gas('getAdminLiveState');
      renderLive(data);
    }

    function renderFull(data, updateForm) {
      if (updateForm) {
        document.getElementById('sessionName').value = data.session.sessionName || '';

        document.getElementById('showParticipants').value =
          normalizeBoolean(data.settings.showParticipants, true) ? 'TRUE' : 'FALSE';

        document.getElementById('answerMaxChars').value = String(
          normalizeAnswerCharLimit(data.settings.answerMaxChars || data.answerMaxChars)
        );
      }

      document.getElementById('systemStatus').value =
        normalizeSystemStatusForUi(data.systemStatus);

      renderSummary({
        participantCount: Array.isArray(data.participants) ? data.participants.length : 0,
        responseCount: data.summary && data.summary.responseCount ? data.summary.responseCount : 0,
        approvedCount: data.summary && data.summary.approvedCount ? data.summary.approvedCount : 0,
        uniqueWordCount: Array.isArray(data.words) ? data.words.length : 0
      });

      renderQuestions(data.questions || [], data.activeQuestionId);
      renderWords(data.words || []);

      lastQuestionListSignature = getQuestionListSignature(
        data.questions || [],
        data.activeQuestionId
      );

      lastLiveSignature = '';
    }

    function renderLive(data) {
      const signature = getLiveSignature(data);

      if (signature === lastLiveSignature) {
        return;
      }

      lastLiveSignature = signature;

      document.getElementById('systemStatus').value =
        normalizeSystemStatusForUi(data.systemStatus);

      renderSummary({
        participantCount: data.participantCount || 0,
        responseCount: data.responseCount || 0,
        approvedCount: data.approvedCount || 0,
        uniqueWordCount: data.uniqueWordCount || 0
      });

      renderWords(data.words || []);

      if (adminState) {
        adminState.activeQuestionId = data.activeQuestionId || adminState.activeQuestionId;
        adminState.systemStatus = data.systemStatus || adminState.systemStatus;
        adminState.words = data.words || [];

        adminState.summary = data.summary || {
          responseCount: data.responseCount || 0,
          approvedCount: data.approvedCount || 0,
          pendingCount: data.pendingCount || 0,
          rejectedCount: data.rejectedCount || 0
        };

        if (Array.isArray(adminState.questions) && data.currentQuestion && data.currentQuestion.questionId) {
          const index = adminState.questions.findIndex(q => {
            return q.questionId === data.currentQuestion.questionId;
          });

          if (index >= 0) {
            adminState.questions[index] = Object.assign(
              {},
              adminState.questions[index],
              data.currentQuestion
            );
          }
        }

        const questionSignature = getQuestionListSignature(
          adminState.questions || [],
          data.activeQuestionId
        );

        if (questionSignature !== lastQuestionListSignature) {
          renderQuestions(adminState.questions || [], data.activeQuestionId);
          lastQuestionListSignature = questionSignature;
        }
      }
    }

    function renderSummary(data) {
      document.getElementById('participantCount').textContent = toNumber(data.participantCount, 0);
      document.getElementById('responseCount').textContent = toNumber(data.responseCount, 0);
      document.getElementById('approvedCount').textContent = toNumber(data.approvedCount, 0);
      document.getElementById('uniqueWordCount').textContent = toNumber(data.uniqueWordCount, 0);
    }

    function getLiveSignature(data) {
      return JSON.stringify({
        activeQuestionId: data.activeQuestionId || '',
        systemStatus: data.systemStatus || '',
        participantCount: data.participantCount || 0,
        responseCount: data.responseCount || 0,
        approvedCount: data.approvedCount || 0,
        uniqueWordCount: data.uniqueWordCount || 0,
        words: (data.words || []).map(w => ({
          text: w.text || '',
          count: Number(w.count || 0)
        })),
        currentQuestion: data.currentQuestion || {}
      });
    }

    function getQuestionListSignature(questions, activeQuestionId) {
      return JSON.stringify({
        activeQuestionId: activeQuestionId || '',
        questions: (questions || []).map(q => ({
          id: q.questionId || '',
          no: q.questionNo || 0,
          text: q.questionText || '',
          status: q.status || '',
          maxResponses: q.maxResponsesPerUser || 0,
          showInCloud: !!q.showInCloud
        }))
      });
    }

    function normalizeAnswerCharLimit(value) {
      const number = Number(value);

      if (!Number.isInteger(number) || number < 1) {
        return 10;
      }

      return Math.min(number, 10);
    }

    function renderQuestions(items, activeQuestionId) {
      const tbody = document.getElementById('questionTable');

      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="6">尚未建立題目</td></tr>';
        return;
      }

      tbody.innerHTML = items.map(q => {
        const questionId = q.questionId || '';
        const status = q.status || '';
        const maxResponses = toNumber(q.maxResponsesPerUser, 3);
        const isActive = questionId === activeQuestionId;

        return `
          <tr
            draggable="true"
            data-question-id="${escapeAttr(questionId)}"
            class="${isActive ? 'activeRow' : ''}"
            ondragstart="handleDragStart(event)"
            ondragover="handleDragOver(event)"
            ondragleave="handleDragLeave(event)"
            ondrop="handleDrop(event)"
            ondragend="handleDragEnd(event)"
          >
            <td class="dragCell">☰</td>
            <td>${escapeHtml(q.questionNo)}</td>
            <td>
              <strong>${escapeHtml(q.questionText)}</strong>
              ${isActive ? '<div class="pill OPEN">目前題目</div>' : ''}
            </td>
            <td>
              <span class="pill ${escapeAttr(status)}">${questionStatusText(status)}</span>
            </td>
            <td>每人最多 ${maxResponses} 次</td>
            <td>
              <button class="miniBtn" onclick="openEditModal('${escapeJsAttr(questionId)}')">編輯</button>
              <button class="miniBtn success" onclick="activateQuestion('${escapeJsAttr(questionId)}')">切換到這題</button>
              <button class="miniBtn warning" onclick="clearQuestion('${escapeJsAttr(questionId)}')">清空回應</button>
              <button class="miniBtn danger" onclick="removeQuestion('${escapeJsAttr(questionId)}')">刪除</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function handleDragStart(event) {
      if (sortingBusy) {
        event.preventDefault();
        return;
      }

      const row = event.currentTarget;

      draggedQuestionId = row.dataset.questionId;
      row.classList.add('dragging');

      event.dataTransfer.effectAllowed = 'move';
      event.dataTransfer.setData('text/plain', draggedQuestionId);
    }

    function handleDragOver(event) {
      event.preventDefault();

      const row = event.currentTarget;

      if (!draggedQuestionId || row.dataset.questionId === draggedQuestionId) {
        return;
      }

      row.classList.add('dropTarget');
      event.dataTransfer.dropEffect = 'move';
    }

    function handleDragLeave(event) {
      event.currentTarget.classList.remove('dropTarget');
    }

    async function handleDrop(event) {
      event.preventDefault();

      const targetRow = event.currentTarget;
      targetRow.classList.remove('dropTarget');

      const tbody = document.getElementById('questionTable');
      const draggedRow = Array.from(tbody.querySelectorAll('tr'))
        .find(row => row.dataset.questionId === draggedQuestionId);

      if (!draggedRow || draggedRow === targetRow) {
        return;
      }

      const rect = targetRow.getBoundingClientRect();
      const insertAfter = event.clientY > rect.top + rect.height / 2;

      if (insertAfter) {
        targetRow.after(draggedRow);
      } else {
        targetRow.before(draggedRow);
      }

      await saveQuestionOrderFromDom();
    }

    function handleDragEnd() {
      const tbody = document.getElementById('questionTable');

      Array.from(tbody.querySelectorAll('tr')).forEach(row => {
        row.classList.remove('dragging');
        row.classList.remove('dropTarget');
      });

      draggedQuestionId = null;
    }

    async function saveQuestionOrderFromDom() {
      if (sortingBusy) {
        return;
      }

      sortingBusy = true;
      setMsg('sortStatus', '排序儲存中...', '');

      try {
        const ids = Array.from(document.querySelectorAll('#questionTable tr[data-question-id]'))
          .map(row => row.dataset.questionId);

        const result = await gas('reorderQuestions', ids);

        adminState = result.state;
        lastFullSyncAt = Date.now();

        renderFull(result.state, false);

        setMsg('sortStatus', result.message || '排序已儲存', 'success');

      } catch (err) {
        setMsg('sortStatus', messageOf(err), 'error');
        refresh();

      } finally {
        sortingBusy = false;
      }
    }

    function renderWords(items) {
      const tbody = document.getElementById('wordTable');

      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="2">尚未有文字</td></tr>';
        return;
      }

      tbody.innerHTML = items.map(w => `
        <tr>
          <td>${escapeHtml(w.text)}</td>
          <td>${escapeHtml(w.count)}</td>
        </tr>
      `).join('');
    }

      document.getElementById('editAllowDuplicateWord').value = 'FALSE';
      document.getElementById('editNeedApproval').value = 'FALSE';
      document.getElementById('editShowInCloud').value = 'TRUE';

    function openEditModal(questionId) {
      const q = (adminState && adminState.questions ? adminState.questions : [])
        .find(item => item.questionId === questionId);

      if (!q) {
        alert('找不到題目');
        return;
      }

      questionModalMode = 'edit';

      document.getElementById('questionModalTitle').textContent = '編輯題目';
      document.getElementById('questionModalSaveBtn').textContent = '儲存修改';

      document.getElementById('editQuestionId').value = q.questionId || '';
      document.getElementById('editQuestionText').value = q.questionText || '';
      document.getElementById('editQuestionStatus').value = q.status || 'OPEN';
      document.getElementById('editMaxResponsesPerUser').value = String(toNumber(q.maxResponsesPerUser, 3));
      document.getElementById('editAllowDuplicateWord').value = normalizeBoolean(q.allowDuplicateWord, false) ? 'TRUE' : 'FALSE';
      document.getElementById('editNeedApproval').value = normalizeBoolean(q.needApproval, false) ? 'TRUE' : 'FALSE';
      document.getElementById('editShowInCloud').value = normalizeBoolean(q.showInCloud, true) ? 'TRUE' : 'FALSE';

      setMsg('editStatusMsg', '', '');
      setMsg('questionStatusMsg', '', '');

      openQuestionModal();
    }

    function openQuestionModal() {
      document.getElementById('questionModal').classList.add('show');

      setTimeout(() => {
        document.getElementById('editQuestionText').focus();
      }, 80);
    }

    function closeQuestionModal() {
      document.getElementById('questionModal').classList.remove('show');
    }

    function closeQuestionModalByOverlay(event) {
      if (event.target.id === 'questionModal') {

    }

    async function saveQuestionFromModal() {
      const questionId = document.getElementById('editQuestionId').value;
      const text = document.getElementById('editQuestionText').value.trim();

      setMsg('editStatusMsg', '儲存中...', '');
      setMsg('questionStatusMsg', '', '');

      if (questionModalMode === 'edit' && !questionId) {
        setMsg('editStatusMsg', '缺少題目 ID', 'error');
        return;
      }

      if (!text) {
        setMsg('editStatusMsg', '請輸入題目文字', 'error');
        return;
      }

      adminBusy = true;
      setQuestionModalSaving(true);

      try {
        const result = await gas('saveQuestion', {
          questionId: questionModalMode === 'edit' ? questionId : '',
          questionText: text,
          status: document.getElementById('editQuestionStatus').value,
          maxResponsesPerUser: document.getElementById('editMaxResponsesPerUser').value,
          allowDuplicateWord: document.getElementById('editAllowDuplicateWord').value,
          needApproval: document.getElementById('editNeedApproval').value,
          showInCloud: document.getElementById('editShowInCloud').value
        });

        adminState = result.state;
        lastFullSyncAt = Date.now();

        renderFull(result.state, false);

        const message = questionModalMode === 'edit'
          ? '已儲存修改'
          : '題目已新增';

        setMsg('editStatusMsg', message, 'success');
        setMsg('questionStatusMsg', message, 'success');

        setTimeout(closeQuestionModal, 350);

      } catch (err) {
        setMsg('editStatusMsg', messageOf(err), 'error');

      } finally {
        adminBusy = false;
        setQuestionModalSaving(false);
        scheduleNextSync(LIVE_SYNC_MS);
      }
    }

    function setQuestionModalSaving(isSaving) {
      const saveBtn = document.getElementById('questionModalSaveBtn');

      if (!saveBtn) {
        return;
      }

      saveBtn.disabled = !!isSaving;
      saveBtn.textContent = isSaving
        ? '儲存中...'
        : (questionModalMode === 'edit' ? '儲存修改' : '儲存題目');
    }

    function questionStatusText(status) {
      if (status === 'OPEN') return '開放';
      if (status === 'CLOSED') return '關閉';
      if (status === 'DRAFT') return '草稿';

      return status || '';
    }

    function gas(fn, payload) {
      return jsonp(GAS_API_URL, fn, payload);
    }

    function jsonp(baseUrl, api, payload) {
      return new Promise((resolve, reject) => {
        const callbackName = '__wc_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');

        const params = new URLSearchParams();

        params.set('api', api);
        params.set('callback', callbackName);
        params.set('_', String(Date.now()));

        if (payload !== undefined) {
          params.set('payload', JSON.stringify(payload));
        }

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('連線逾時，請稍後再試'));
        }, 15000);

        function cleanup() {
          clearTimeout(timer);
          delete window[callbackName];

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = data => {
          cleanup();

          if (!data || data.ok === false) {
            reject(new Error(data && data.message ? data.message : 'API 執行失敗'));
            return;
          }

          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('無法連線到後端 API'));
        };

        script.src = baseUrl + '?' + params.toString();
        document.head.appendChild(script);
      });
    }

    function setMsg(id, text, type) {
      const el = document.getElementById(id);

      if (!el) {
        return;
      }

      el.textContent = text || '';
      el.className = 'status ' + (type || '');
    }

    function messageOf(err) {
      return err && err.message
        ? err.message.replace(/^Exception:\s*/i, '')
        : '發生錯誤';
    }

    function normalizeBoolean(value, defaultValue) {
      if (value === true) return true;
      if (value === false) return false;

      const text = String(value == null ? '' : value).trim().toUpperCase();

      if (['TRUE', 'YES', 'Y', '1'].includes(text)) return true;
      if (['FALSE', 'NO', 'N', '0'].includes(text)) return false;

      return !!defaultValue;
    }

    function toNumber(value, defaultValue) {
      const number = Number(value);

      return Number.isFinite(number)
        ? number
        : defaultValue;
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function escapeJsAttr(value) {
      return String(value == null ? '' : value)
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/\r/g, '\\r')
        .replace(/\n/g, '\\n');
    }
